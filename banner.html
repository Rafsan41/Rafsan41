<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Rafsan Banner</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 900px;
    height: 280px;
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
  }

  /* ── KEYFRAMES ── */
  @keyframes gradientShift {
    0%   { background-position: 0% 50%; }
    50%  { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
  @keyframes fadeSlideDown {
    from { opacity: 0; transform: translateY(-18px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeSlideUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  @keyframes slideInRight {
    from { opacity: 0; transform: translateX(40px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  @keyframes shimmerName {
    0%   { background-position: -200% center; }
    100% { background-position: 200% center; }
  }
  @keyframes chipPop {
    0%   { opacity: 0; transform: scale(0.4); }
    70%  { transform: scale(1.15); }
    100% { opacity: 1; transform: scale(1); }
  }
  @keyframes btnPulse {
    0%, 100% { box-shadow: 0 2px 8px rgba(124,58,237,0.4); }
    50%       { box-shadow: 0 2px 22px rgba(124,58,237,0.8), 0 0 0 5px rgba(124,58,237,0.12); }
  }
  @keyframes dotPulse {
    0%, 100% { transform: scale(1); opacity: 0.35; }
    50%       { transform: scale(2.2); opacity: 0.75; }
  }

  /* Bubble float paths — each unique */
  @keyframes bf1 {
    0%,100% { transform: translate(0,0) scale(1); }
    30%     { transform: translate(7px,-13px) scale(1.06); }
    65%     { transform: translate(-5px,-20px) scale(0.96); }
  }
  @keyframes bf2 {
    0%,100% { transform: translate(0,0) scale(1); }
    35%     { transform: translate(-9px,-15px) scale(1.07); }
    70%     { transform: translate(6px,-22px) scale(0.95); }
  }
  @keyframes bf3 {
    0%,100% { transform: translate(0,0); }
    45%     { transform: translate(9px,-17px); }
    75%     { transform: translate(-4px,-9px); }
  }
  @keyframes bf4 {
    0%,100% { transform: translate(0,0) rotate(0deg); }
    50%     { transform: translate(-7px,-19px) rotate(180deg); }
  }
  @keyframes bf5 {
    0%,100% { transform: translate(0,0) scale(1); }
    40%     { transform: translate(11px,-11px) scale(1.08); }
    70%     { transform: translate(-3px,-19px) scale(0.94); }
  }
  @keyframes bf6 {
    0%,100% { transform: translate(0,0); }
    50%     { transform: translate(-11px,-15px); }
  }
  @keyframes glowPulse {
    0%,100% { box-shadow: 0 4px 14px rgba(0,0,0,0.18); }
    50%     { box-shadow: 0 4px 22px rgba(124,58,237,0.5), 0 0 0 3px rgba(255,255,255,0.22); }
  }

  /* ── BANNER ── */
  .banner {
    width: 900px;
    height: 280px;
    background: linear-gradient(270deg, #6d59f5, #9b7ff5, #c4b5fd, #ddd6fe, #b197fc, #7c6ff7);
    background-size: 400% 400%;
    animation: gradientShift 9s ease infinite;
    display: flex;
    align-items: center;
    position: relative;
    overflow: hidden;
  }
  .banner::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 58% 45%, rgba(255,255,255,0.24) 0%, transparent 65%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── LEFT ── */
  .left {
    width: 210px;
    height: 100%;
    position: relative;
    flex-shrink: 0;
    z-index: 1;
  }

  .collaborate-btn {
    position: absolute;
    top: 22px;
    left: 18px;
    background: #7c3aed;
    color: #fff;
    font-size: 12px;
    font-weight: 700;
    padding: 7px 15px;
    border-radius: 20px;
    letter-spacing: 0.3px;
    animation: fadeSlideDown 0.55s ease 0.1s both, btnPulse 2.6s ease-in-out 1s infinite;
  }

  /* Round bubble base */
  .bubble {
    position: absolute;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 2.5px solid rgba(255,255,255,0.35);
    overflow: hidden;
  }
  .bubble img {
    width: 60%;
    height: 60%;
    object-fit: contain;
    display: block;
  }

  .bubble-lg { width: 46px; height: 46px; }
  .bubble-md { width: 38px; height: 38px; }
  .bubble-sm { width: 30px; height: 30px; }

  .b-ts     { background:#3178C6; top:68px;  left:14px;  animation: fadeIn .4s .3s both, bf1 4.2s ease-in-out 1.0s infinite, glowPulse 3.0s ease-in-out 1.0s infinite; }
  .b-react  { background:#20232A; top:138px; left:55px;  animation: fadeIn .4s .5s both, bf2 3.8s ease-in-out 1.3s infinite, glowPulse 3.4s ease-in-out 1.3s infinite; }
  .b-next   { background:#111111; top:192px; left:22px;  animation: fadeIn .4s .7s both, bf3 5.0s ease-in-out 1.6s infinite, glowPulse 2.8s ease-in-out 1.6s infinite; }
  .b-prisma { background:#2D3748; top:205px; left:90px;  animation: fadeIn .4s .9s both, bf4 4.5s ease-in-out 1.9s infinite, glowPulse 3.6s ease-in-out 1.9s infinite; }
  .b-node   { background:#339933; top:105px; left:125px; animation: fadeIn .4s 1.1s both, bf5 3.5s ease-in-out 2.2s infinite, glowPulse 3.2s ease-in-out 2.2s infinite; }
  .b-mongo  { background:#47A248; top:55px;  left:142px; animation: fadeIn .4s 1.3s both, bf6 4.8s ease-in-out 2.5s infinite, glowPulse 4.0s ease-in-out 2.5s infinite; }

  .dot { position:absolute; border-radius:50%; background:rgba(90,50,190,0.4); }
  .d1 { width:6px; height:6px; top:112px; left:58px;  animation: fadeIn .3s 1.5s both, dotPulse 2.0s ease-in-out 2.0s infinite; }
  .d2 { width:5px; height:5px; top:168px; left:102px; animation: fadeIn .3s 1.6s both, dotPulse 2.5s ease-in-out 2.3s infinite; }
  .d3 { width:4px; height:4px; top:84px;  left:162px; animation: fadeIn .3s 1.7s both, dotPulse 1.8s ease-in-out 1.8s infinite; }
  .d4 { width:4px; height:4px; top:148px; left:34px;  animation: fadeIn .3s 1.8s both, dotPulse 2.2s ease-in-out 2.6s infinite; }

  /* ── CENTER ── */
  .center {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    position: relative;
    z-index: 1;
    padding: 0 10px;
  }

  .name-row {
    display: flex;
    align-items: center;
    gap: 10px;
    animation: fadeSlideDown 0.7s ease 0.25s both;
  }
  .name {
    font-size: 36px;
    font-weight: 900;
    letter-spacing: -0.5px;
    line-height: 1;
    background: linear-gradient(90deg, #1e0a3c 25%, #7c3aed 50%, #1e0a3c 75%);
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmerName 3.8s linear 1.4s infinite;
  }
  .name-curl {
    font-size: 26px;
    color: #7c3aed;
    transform: rotate(-10deg) scaleX(-1);
    display: inline-block;
    line-height: 1;
    animation: fadeIn 0.6s ease 0.9s both;
  }
  .title {
    font-size: 14px;
    font-weight: 600;
    color: #4c1d95;
    letter-spacing: 0.8px;
    text-transform: uppercase;
    animation: fadeSlideDown 0.7s ease 0.45s both;
  }

  /* Center tech chips — round with proper icons */
  .tech-row {
    display: flex;
    gap: 9px;
    margin-top: 4px;
  }
  .tech-chip {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.18);
    border: 2px solid rgba(255,255,255,0.32);
    overflow: hidden;
  }
  .tech-chip img {
    width: 58%;
    height: 58%;
    object-fit: contain;
  }
  .tech-chip:nth-child(1) { animation: chipPop .4s ease 0.65s both; }
  .tech-chip:nth-child(2) { animation: chipPop .4s ease 0.80s both; }
  .tech-chip:nth-child(3) { animation: chipPop .4s ease 0.95s both; }
  .tech-chip:nth-child(4) { animation: chipPop .4s ease 1.10s both; }
  .tech-chip:nth-child(5) { animation: chipPop .4s ease 1.25s both; }
  .tech-chip:nth-child(6) { animation: chipPop .4s ease 1.40s both; }

  .tagline {
    font-size: 13px;
    color: #3b0764;
    font-weight: 500;
    margin-top: 6px;
    text-align: center;
    animation: fadeSlideUp 0.7s ease 1.0s both;
  }
  .contact-row {
    display: flex;
    gap: 20px;
    margin-top: 6px;
    animation: fadeSlideUp 0.7s ease 1.2s both;
  }
  .contact-item {
    font-size: 11.5px;
    color: #4c1d95;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .contact-item svg {
    width: 13px;
    height: 13px;
    fill: #7c3aed;
    flex-shrink: 0;
  }

  /* ── RIGHT ── */
  .right {
    width: 220px;
    height: 100%;
    flex-shrink: 0;
    position: relative;
    z-index: 1;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    overflow: hidden;
  }
  .photo {
    height: 275px;
    width: auto;
    display: block;
    filter: drop-shadow(-6px 0 16px rgba(80,40,180,0.3));
    animation: slideInRight 0.8s ease 0.35s both;
  }
  .photo-placeholder {
    width: 155px;
    height: 200px;
    border-radius: 14px;
    background: rgba(255,255,255,0.28);
    border: 2px dashed rgba(124,58,237,0.45);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #7c3aed;
    font-size: 13px;
    font-weight: 600;
    gap: 8px;
    margin-bottom: 12px;
    animation: slideInRight 0.8s ease 0.35s both;
  }
  .photo-placeholder svg {
    width: 36px;
    height: 36px;
    fill: rgba(124,58,237,0.5);
  }
</style>
</head>
<body>
<div class="banner">

  <!-- LEFT — floating round bubbles with proper icons -->
  <div class="left">
    <div class="collaborate-btn">Let's Collaborate!</div>

    <!-- TypeScript -->
    <div class="bubble bubble-lg b-ts">
      <img src="https://cdn.simpleicons.org/typescript/ffffff" alt="TypeScript" />
    </div>

    <!-- React -->
    <div class="bubble bubble-lg b-react">
      <img src="https://cdn.simpleicons.org/react/61DAFB" alt="React" />
    </div>

    <!-- Next.js -->
    <div class="bubble bubble-md b-next">
      <img src="https://cdn.simpleicons.org/nextdotjs/ffffff" alt="Next.js" />
    </div>

    <!-- Prisma -->
    <div class="bubble bubble-sm b-prisma">
      <img src="https://cdn.simpleicons.org/prisma/ffffff" alt="Prisma" />
    </div>

    <!-- Node.js -->
    <div class="bubble bubble-md b-node">
      <img src="https://cdn.simpleicons.org/nodedotjs/ffffff" alt="Node.js" />
    </div>

    <!-- MongoDB -->
    <div class="bubble bubble-sm b-mongo">
      <img src="https://cdn.simpleicons.org/mongodb/ffffff" alt="MongoDB" />
    </div>

    <div class="dot d1"></div>
    <div class="dot d2"></div>
    <div class="dot d3"></div>
    <div class="dot d4"></div>
  </div>

  <!-- CENTER -->
  <div class="center">
    <div class="name-row">
      <span class="name">Rafsan Dipto</span>
      <span class="name-curl">↩</span>
    </div>

    <div class="title">Full Stack Developer</div>

    <div class="tech-row">
      <div class="tech-chip" style="background:#3178C6;">
        <img src="https://cdn.simpleicons.org/typescript/ffffff" alt="TypeScript" />
      </div>
      <div class="tech-chip" style="background:#20232A;">
        <img src="https://cdn.simpleicons.org/react/61DAFB" alt="React" />
      </div>
      <div class="tech-chip" style="background:#111111;">
        <img src="https://cdn.simpleicons.org/nextdotjs/ffffff" alt="Next.js" />
      </div>
      <div class="tech-chip" style="background:#2D3748;">
        <img src="https://cdn.simpleicons.org/prisma/ffffff" alt="Prisma" />
      </div>
      <div class="tech-chip" style="background:#339933;">
        <img src="https://cdn.simpleicons.org/nodedotjs/ffffff" alt="Node.js" />
      </div>
      <div class="tech-chip" style="background:#4169E1;">
        <img src="https://cdn.simpleicons.org/postgresql/ffffff" alt="PostgreSQL" />
      </div>
    </div>

    <div class="tagline">Turning ideas into clean, scalable web apps</div>

    <div class="contact-row">
      <div class="contact-item">
        <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4-8 5-8-5V6l8 5 8-5v2z"/></svg>
        rafsundipto116@gmail.com
      </div>
      <div class="contact-item">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.94-.49-7-3.85-7-7.93s3.06-7.44 7-7.93v15.86zm2 0V4.07c3.94.49 7 3.85 7 7.93s-3.06 7.44-7 7.93z"/></svg>
        rafsandev.vercel.app
      </div>
    </div>
  </div>

  <!-- RIGHT — photo -->
  <div class="right">
    <img class="photo" src="./Public/20180526_043831-removebg-preview.png" alt="Rafsan Dipto" />
  </div>

</div>
</body>
</html>
